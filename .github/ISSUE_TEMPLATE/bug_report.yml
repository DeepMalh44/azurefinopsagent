name: Bug report
description: Report a defect in Azure FinOps Agent
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment surface
      options:
        - Local (dotnet run)
        - Local (Docker)
        - Azure App Service (container)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version (from /api/version)
      placeholder: "sha=... build=..."
  - type: textarea
    id: logs
    attributes:
      label: Logs / Application Insights query results
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
