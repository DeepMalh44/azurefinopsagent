name: Feature request
description: Suggest a new tool, FinOps scenario, or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New AI tool (Azure / Graph / Log Analytics)
        - FinOps scenario (Crawl / Walk / Run)
        - UI / chat experience
        - Deployment / infrastructure
        - Observability / telemetry
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
